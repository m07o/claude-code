<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Web UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Claude Code</h2>
                <div class="status-indicator" id="status-dot"></div>
            </div>
            <div class="config-section">
                <label for="providerUrl">Provider URL</label>
                <input type="text" id="providerUrl" placeholder="https://api.groq.com/openai/v1" value="https://api.groq.com/openai/v1" />
                
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" placeholder="Bearer YOUR_GROQ_KEY" />
                
                <div class="actions">
                    <button class="btn-primary" id="startBtn">Start CLI</button>
                    <button class="btn-danger" id="stopBtn">Stop</button>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <div class="chat-history" id="chatHistory">
                <!-- Messages will appear here -->
                <div class="message server-msg">
                    Welcome to the Open-ClaudeCode Web UI wrapper.
                </div>
            </div>
            
            <div class="chat-input-area">
                <textarea id="cmdInput" placeholder="Type a message or command..." rows="1"></textarea>
                <button class="btn-send" id="sendBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Include AnsiUp to parse ANSI terminal codes generated by the CLI -->
    <script src="https://cdn.jsdelivr.net/npm/ansi_up@5.1.0/ansi_up.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
